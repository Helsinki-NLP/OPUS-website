<p>
O, həkim idi.<br/>
Նա բժիշկ էր:<br/>
<hr/>
Ağac ilk meyvəsini verdi.<br/>
Ծառը տվեց իր առաջին պտուղը:<br/>
<hr/>
Mən sizin kimi olmaq istəyirəm.<br/>
Ես ուզում եմ ձեզ նման լինել։<br/>
<hr/>
İrqçilik dövrümüzün ən təhlükəli xəstəliyidir.<br/>
Ռասիզմը մեր դարաշրջանի ամենավտանգավոր հիվանդությունն է։<br/>
<hr/>
