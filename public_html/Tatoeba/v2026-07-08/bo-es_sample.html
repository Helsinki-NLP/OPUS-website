<p>
ཐའེ་ཧྲན་རི་བོས་རྡུལ་ཙམ་མི་འདོར་བས། དེ་ཡི་གཏོས་ནི་ཤིན་ཏུ་ཆེན་པོར་གྱུར། མཚོ་དང་གཙང་པོས་ཆུ་ཕྲན་ཡིན་ཀྱང་ལེན། དེ་ཡི་གཏིང་ནི་ཤིན་ཏུ་ཟབ་པར་གྱུར།<br/>
El monte Tai es grande porque no desecha tierra; los mares son profundos porque no desdeñan riachuelo.<br/>
