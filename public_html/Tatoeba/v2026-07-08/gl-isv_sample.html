<p>
Os deuses existen.<br/>
Bogi obstajajut.<br/>
<hr/>
Deus non é real.<br/>
Bog ne jest realny.<br/>
<hr/>
A guerra é paz. A liberdade é escravitude. A ignorancia é forza.<br/>

<hr/>

Žitje jest naděja.<br/>
<hr/>

My jesmo zvězdny prah.<br/>
