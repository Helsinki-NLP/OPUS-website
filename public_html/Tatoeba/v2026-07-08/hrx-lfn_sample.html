<body>
<p>
Er wohnd in Palëstina.<br/>
El abita en Filastin.<br/>
<hr/>
Wunnerscheen!<br/>
Merveliosa!<br/>
<hr/>
Es selld keen Billioneer gewe.<br/>
On no ta debe ave bilionores.<br/>
<hr/>
Waromm hod Gott dëssidierd uns all stinkiche Äärsch gewe?<br/>
Perce Dio ia deside dona culos apestante a tota nos?<br/>
<hr/>
Fielst-du dich krank?<br/>
Esce tu senti malada?<br/>
<hr/>
