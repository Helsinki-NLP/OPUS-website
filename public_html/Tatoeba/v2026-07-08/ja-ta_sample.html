あなたのお父さんが、「もし私の息子に会ったら、家に帰るように伝えてください」と言っていました。<br/>
“என் மகனை சந்தித்தால், அவனை வீட்டிற்கு திரும்ப சொல்லு” என்று உன் அப்பா கூறினார்.<br/>
