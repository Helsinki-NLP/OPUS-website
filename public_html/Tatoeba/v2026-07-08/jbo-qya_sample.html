<p>
mi djica tu'a lo cukta<br/>
Méranyë parma.<br/>
<hr/>
le munje cu melbi<br/>
I ambar vanya.<br/>
<hr/>
le terdi cu melbi<br/>
I ambar vanya.<br/>
<hr/>
lo'e tricu cu jmive<br/>
Aldar coinar.<br/>
<hr/>
ma remna<br/>
Mana atan?<br/>
<hr/>
lo ka panpi ku cu cumki<br/>
Rainë cárima.<br/>
<hr/>
mi mamta<br/>
Nanyë amil.<br/>
<hr/>
ta cu me lo cukta po do<br/>
Ta parmalya.<br/>
<hr/>
ta cu me lo cukta po do<br/>
Ta parmalda.<br/>
