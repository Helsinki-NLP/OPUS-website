<p>
Үчүнчү класстамын.<br/>
مەن ئۈچىنچى سىنىپتا.<br/>
<hr/>
Коркпоңуз!<br/>
قورقماڭ!<br/>
<hr/>
Бул китепти ким жазган эле?<br/>
بۇ كىتابنى كىم يازغان ئىدى؟<br/>
<hr/>
Эт жегенди жакшы көрөм.<br/>
گۆش يېيىشنى ياخشى كۆرىمەن.<br/>
