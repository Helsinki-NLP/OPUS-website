<p>
Сезон охоты в северном Алжире только что начался.<br/>
Мавсими шикор дар шимоли Алҷазоир навакак оғоз ёфт.<br/>
<hr/>
Они и сейчас ничего не понимают.<br/>
Онҳо ҳоло ҳам ҳеч чизро намефаҳманд.<br/>
<hr/>
Кто такой Бог?<br/>
Худо кист?<br/>
<hr/>
Что такое Бог?<br/>
Худо чист?<br/>
<hr/>
Кто такой Бог? Что такое Бог?<br/>
Худо кист? Худо чист?<br/>
