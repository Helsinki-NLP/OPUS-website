<p>
Նա բժիշկ էր:<br/>
ის ექიმი იყო.<br/>
<hr/>
Ծառը տվեց իր առաջին պտուղը:<br/>
ხემ პირველი ნაყოფი მისცა.<br/>
<hr/>
Ես բուդդիստ եմ։<br/>
მე ბუდისტი ვარ.<br/>
<hr/>
Ո՞րն է քո կրոնը։<br/>
რა არის შენი რელიგია?<br/>
<hr/>
Ես միսիոներ չեմ։<br/>
მე არ ვარ მისიონერი.<br/>
<hr/>
Մենք ունենք երկու կատու։<br/>
ორი კატა გვყავს.<br/>
<hr/>
Ես Հելսինկիում չեմ ապրում։<br/>
ჰელსინკიში არ ვცხოვრობ.<br/>
<hr/>
