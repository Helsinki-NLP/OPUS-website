<p>
80 เปอร์เซ็นต์ของคำศัพท์ภาษาอังกฤษ มาต้นกำเนิดมาจากภาษาอื่น<br/>
80 % 嘅英文詞彙佢嘅起源係嚟自其他語言。<br/>
<hr/>
คุณลุงของฉันเข้าใจภาษาฝรั่งเศสอย่างลึกซึ้ง<br/>
我叔叔對法文有深刻嘅認識。<br/>
<hr/>
เธอเห็นตัวเองในกระจก<br/>
佢喺鏡度見到自己。<br/>
