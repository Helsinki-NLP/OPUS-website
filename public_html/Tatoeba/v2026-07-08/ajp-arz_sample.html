<p>
سامي صَبْ لَحالُه كاسِةْ عَصير<br/>
سامي صب لنفسو كوبّيت عصير.<br/>
<hr/>
وينْ اَنا<br/>
انا فين؟<br/>
<hr/>
قالولي إنهم ما عرفو يحكو بالفرنسي.<br/>
قالولي مش عرفين يتكلمو فرينسي.<br/>
<hr/>
فيهم يعملو هاد لحالهم.<br/>
بيقدرو يعملو وحدهم.<br/>
<hr/>
كيف نشرح هاد؟<br/>
بنشرح ده ازّاي؟<br/>
<hr/>
همّي المدافعين عن المدينة.<br/>
هم المدافعين عن المدينة.<br/>
