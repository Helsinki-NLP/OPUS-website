<p>
Tomás se convierte en padre.<br/>
ቶም አቡዬ ገብእ እግልዬ።<br/>
<hr/>
¿Disculpe?<br/>
መዐሌሽ?<br/>
<hr/>
Podemos.<br/>
እንቀድር።<br/>
<hr/>
Replanteáosla.<br/>
ካልእ ሕሰብ ዲቡ።<br/>
<hr/>
¿Continuar?<br/>
ትሉሉይ?<br/>
<hr/>
Las plantas mueren debido al suelo seco.<br/>
ነባታት እብ ሰበብ የባሰት ትርበት መይት።<br/>
<hr/>
¡Vendidos!<br/>
ዝቡይ!<br/>
<hr/>
¿Disculpe?<br/>
ዐፎ?<br/>
<hr/>
Susurré.<br/>
ሐሸክሸኮ።<br/>
<hr/>
