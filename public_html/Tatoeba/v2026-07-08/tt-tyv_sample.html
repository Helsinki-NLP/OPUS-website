<p>
Мин икейөзле түгел.<br/>
Мен ийи арынныг эвес мен.<br/>
<hr/>
Бүген һава торышы нинди?<br/>
Бөгүн агаар кандыг-дыр?<br/>
<hr/>
Бу әкиятнең ахыры ничек булыр?<br/>
Бо тоолдуң төнчүзү канчаар келирил?<br/>
<hr/>
Ул үрмәкүчләрдән курка.<br/>
Ол ээремчиктен коргар.<br/>
