<p>
Պետք չի, որ հասկանաս։<br/>
Vos non lo debe prender.<br/>
<hr/>
Ձեր կատուն նայում է մեզ:<br/>
Tu catto nos reguarda.<br/>
<hr/>
Գիտե՞ս, թե որտեղ է Թոմը ուզում ապրել:<br/>
Sape tu ubi Tom vole viver?<br/>
