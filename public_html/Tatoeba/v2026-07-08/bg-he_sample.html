<p>
Вселената е загадка.<br/>
היקום תעלומה.<br/>
<hr/>
Тогава дойдоха при царя две блудници та застанаха пред него.<br/>
אָ֣ז תָּבֹ֗אנָה שְׁתַּ֛יִם נָשִׁ֥ים זֹנֹ֖ות אֶל־הַמֶּ֑לֶךְ וַֽתַּעֲמֹ֖דְנָה לְפָנָֽיו׃<br/>
<hr/>
Ние нямаме Папа!<br/>
אין לנו אפיפיור!<br/>
<hr/>
