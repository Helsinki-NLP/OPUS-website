<p>
Tetu Frans.<br/>
זי שטאַמט פֿון פֿראַנקרײַך.<br/>
<hr/>
Kɛpasa mi bojode.<br/>
איך דאַרף איצט אַוועקגיין.<br/>
<hr/>
Nano vova aluga asetan.<br/>
נאַנאָ רעדט זעקס שפּראַכן.<br/>
<hr/>
Aluga yɛ ireyi.<br/>
שפּראַכן זענען לעבעדיקע זאַכן.<br/>
<hr/>
Aluga yɛ ireyi.<br/>
שפּראַכן זענען לעבעדיקע באַשעפֿענישן.<br/>
<hr/>
Aluga yɛ ireyi.<br/>
אַ שפּראַך איז אַ חי.<br/>
