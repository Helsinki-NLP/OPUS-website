<p>
אנחנו במלחמה.<br/>
Mi smo u ratu.<br/>
<hr/>
אלוהים הוא פיל.<br/>
Bog je slon.<br/>
<hr/>
אָ֣ז תָּבֹ֗אנָה שְׁתַּ֛יִם נָשִׁ֥ים זֹנֹ֖ות אֶל־הַמֶּ֑לֶךְ וַֽתַּעֲמֹ֖דְנָה לְפָנָֽיו׃<br/>
Tada dođoše dvije bludnice kralju i stadoše preda nj.<br/>
<hr/>
אני בינה מלאכותית.<br/>
Ja sam umjetna inteligencija.<br/>
