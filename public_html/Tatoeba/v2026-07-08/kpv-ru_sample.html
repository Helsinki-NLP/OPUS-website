<body>
<p>
Тэнад вошӧмсянь коли уна кад.<br/>
Прошло много времени с тех пор, как ты пропал.<br/>
<hr/>
Ме тіянӧс сэтшӧм регыд эг виччысь.<br/>
Я вас так скоро не ждал.<br/>
<hr/>
Рима да Скура некор оз йӧктыны.<br/>
Рима и Скура никогда не танцуют.<br/>
<hr/>
Нёльӧд судта, пӧжалуйста.<br/>
Четвёртый этаж, пожалуйста.<br/>
<hr/>
