<p>
Won czãsto je rëbë na vjeczérzõ.<br/>
Tāns deznimai īst zukkans per bitasīdin.<br/>
<hr/>
A chto bë chcôł kùpic taką lëchą tobakã?<br/>
Be kas kwāilai kāuptun tīt wārgan sampantēran?<br/>
<hr/>
Òni nigdë nie chcelë jachac do Warszawë.<br/>
Tenēi nikwēigi ni kwaitēi jātwei en Waršūwan.<br/>
<hr/>
Jô móm ten nokc złómiony.<br/>
As perlīmi naguttin.<br/>
