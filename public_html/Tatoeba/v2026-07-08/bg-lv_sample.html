<p>
Семейството ми живее в града.<br/>
Mana ģimene dzīvo pilsētā.<br/>
<hr/>
Той отговори на въпроса.<br/>
Viņš atbildēja uz jautājumu.<br/>
<hr/>
Децата днес не са на училище.<br/>
Bērni šodien nav skolā.<br/>
<hr/>
Това е малко село.<br/>
Šis ir mazs ciemats.<br/>
<hr/>
Трябва ми още кафе.<br/>
Man vajag vēl kafiju.<br/>
