<p>
Die Hasmoneërs was 'n Joodse koninklike dinastie wat oor die Land Israel geheers het en die Makkabese opstand gelei het.<br/>
בֵּית חַשְׁמוֹנַאי הֲוָה בֵּית מַלְכוּתָא דִּיהוּדָאֵי, דְּשַׁלִּיט בְּאַרְעָא דְּיִשְׂרָאֵל וְקָאֵי בְּרֵישׁ מַרְדּוּתָא דְּמַכַּבָּאֵי.<br/>
