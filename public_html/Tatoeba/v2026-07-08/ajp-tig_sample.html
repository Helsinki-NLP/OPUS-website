<body>
<p>
سامي صَبْ لَحالُه كاسِةْ عَصير<br/>
ሳሚ እግል ነፍሱ ክባየት ዐሲር ዐለ።<br/>
<hr/>
توم كان بطلي.<br/>
ቶም ፈርሼ ዐለ።<br/>
<hr/>
السلاحف ما عندها أسنان.<br/>
ጋብሌታት አንያብ አለበ።<br/>
<hr/>
مش معقول!<br/>
ለኢልትአመን ቱ።<br/>
<hr/>
عن جد؟<br/>
እብ አማን?<br/>
<hr/>
مرحباً<br/>
ሰላም።<br/>
<hr/>
كس أمك!<br/>
ጀምር እምከ!<br/>
<hr/>
لأ.<br/>
ኢኮን።<br/>
<hr/>
نعم.<br/>
ኣቤ።<br/>
<hr/>
</body></html/>
