<body>
<p>
Evde yemek var mı?<br/>
Бажыңда аъш-чем бар бе?<br/>
<hr/>
Bu ev değil.<br/>
Бо бажың эвес.<br/>
<hr/>
O bayrağı tut.<br/>
Ол тукту тут.<br/>
<hr/>
Müzik dinlemeyi çok severim.<br/>
Хөгжүм дыңнаарынга дыка ынак мен.<br/>
<hr/>
Domuzlar uçamaz.<br/>
Хаваннар ужуп шыдавас.<br/>
<hr/>
O beni görüyor mu?<br/>
Ол мени көрүп турар бе?<br/>
<hr/>
