<p>
ποῦ ἐστι τὸ ποτήριον;<br/>

Susunya ada di dalam cangkir.<br/>

Airnya manis.<br/>
<hr/>

Aku mempelajari bahasa Yunani.<br/>
<hr/>

Huruf kedua adalah beta.<br/>
