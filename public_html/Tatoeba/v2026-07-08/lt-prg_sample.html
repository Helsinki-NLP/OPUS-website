<p>
Jis abejojo.<br/>
Tāns swirrina.<br/>
<hr/>
Žinau.<br/>
As waīda.<br/>
<hr/>
Ateisiu.<br/>
As wīrst pergūbuns.<br/>
<hr/>
Ar tu palaistei augalus?<br/>
Assei tū enwundinnuns aūgmenins?<br/>
<hr/>
Ar matai žvaigždę?<br/>
Wīda tū lāuksnan?<br/>
<hr/>
Aš myliu tavo sūnų.<br/>
As mīli twajjan sūnun.<br/>
<hr/>
Aš myliu tavo dukrą.<br/>
As mīli twajjan duktin.<br/>
