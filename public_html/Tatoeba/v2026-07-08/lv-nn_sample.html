<p>
Tā bija pele.<br/>
Det var ei mus.<br/>
<hr/>
Es dzīvoju Latvijā.<br/>
Eg bur i Latvia.<br/>
<hr/>
Es mīlu baltu valodas.<br/>
Eg elskar baltiske språk.<br/>
<hr/>
Mācoties slēpot, vislabāk ir izvairīties no stāvām nogāzēm.<br/>
Når du lærer å stå på ski, er det best å unngå bratte bakkar.<br/>
