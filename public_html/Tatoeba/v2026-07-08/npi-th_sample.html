<p>

ใช้เครื่องคิดเลข<br/>
<hr/>
धन्यवाद भन्न मन लाग्यो।<br/>
ฉันอยากพูดว่าขอบคุณ<br/>
<hr/>

เขากำลังจะออกจากลอนดอน<br/>
<hr/>
उनीसँग सिद्ध साक्षी छ।<br/>
เธอมีพยานที่สมบูรณ์แบบ<br/>
