<p>
De Tom hod mein Prim gekussd.<br/>
El Tom el gà baxà ła mé cuxina.<br/>
<hr/>
Ich hon alles.<br/>
Gò tuto.<br/>
<hr/>
Ich esse keen Fisch.<br/>
No manjo mìa pése.<br/>
<hr/>
Du bist en Schlang!<br/>
Te sì na sarpente!<br/>
<hr/>
Willst-du en Glaas Wein drinke?<br/>
Vołito bévar un got de vin?<br/>
<hr/>
