<p>
彼は他に何と言った？<br/>
ᮔᮇᮔ᮪ ᮓᮩᮄ ᮔᮥ ᮄᮑ ᮇᮙᮧᮀᮊᮩᮔ᮪?<br/>
<hr/>
あなたのお父さんが、「もし私の息子に会ったら、家に帰るように伝えてください」と言っていました。<br/>
Bapa anjeun nitip pesan, “Lamun pendak jeung anak abdi, titah anjeunna balik.”<br/>
