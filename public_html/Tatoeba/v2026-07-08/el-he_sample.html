<p>
Το νερό δεν είναι κρύο.<br/>
המים לא קרים.<br/>
<hr/>
Θέλω να μάθω ελληνικά.<br/>
אני רוצה ללמוד יוונית.<br/>
<hr/>
Τι είναι η ελευθερία;<br/>
מהו חופש?<br/>
<hr/>
Είμαι Κινέζος και αγαπώ την Κίνα.<br/>
אני סיני ואני אוהב את סין.<br/>
<hr/>
Ο κόσμος παρακολουθεί.<br/>
העולם מסתכל.<br/>
<hr/>
Μισώ τα ψέματα.<br/>
אני שונאת שקרים.<br/>
<hr/>
Μισώ τα ψέματα.<br/>
אני שונא שקרים.<br/>
