<p>
Бу ӱй эмес.<br/>
Bu ev değil.<br/>
<hr/>
Слерге не керек?<br/>
Size ne gerek?<br/>
<hr/>
Агаш ӧскӧн.<br/>
Ağaç büyüdü.<br/>
<hr/>
Кыс школго барды.<br/>
Kız okula gitti.<br/>
<hr/>
Музыка угарга тыҥ сӱӱп јадым.<br/>
Müzik dinlemeyi çok severim.<br/>
<hr/>
Мен кӧрӱп турум бойымныҥ таајымды.<br/>
Tacımı görüyorum.<br/>
<hr/>
Баазы канча?<br/>
Kaç para?<br/>
<hr/>
Пивоныҥ баазы канча?<br/>
Bira kaç para?<br/>
