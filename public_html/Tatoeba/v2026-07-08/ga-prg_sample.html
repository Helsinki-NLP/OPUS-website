<p>
Tá an oíche dorcha.<br/>
Nakts ast timran.<br/>
<hr/>
Tá an teach mór.<br/>
Buttan ast debīkan.<br/>
<hr/>
Tá mé ag léamh litir.<br/>
As skaitāi pēismen.<br/>
<hr/>
Tá mé ag ól bainne.<br/>
As pūja daddan.<br/>
<hr/>
Tá an t-uisce glas.<br/>
Undan ast zalli.<br/>
<hr/>
Tá cat bán agam.<br/>
As turri gaīlan kattan.<br/>
