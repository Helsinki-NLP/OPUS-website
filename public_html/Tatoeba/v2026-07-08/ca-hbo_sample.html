<p>
Els asmoneus van ser una dinastia reial jueva que va governar la Terra d'Israel i va liderar la revolta macabea.<br/>
בֵּית חַשְׁמוֹנַאי הָיָה בֵּית מַלְכוּת יְהוּדִי, אֲשֶׁר מָשַׁל בְּאֶרֶץ יִשְׂרָאֵל וְעָמַד בְּרֹאשׁ מֶרֶד הַמַּכַּבִּים׃<br/>
<hr/>
Són els defensors de la ciutat.<br/>
הֵמָּה מָגִנֵּי הָעִיר׃<br/>
