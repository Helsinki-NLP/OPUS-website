<p>
Τι χρειάζεσαι;<br/>
Саған не қажет?<br/>
<hr/>
Από ποιον το έμαθες αυτό;<br/>
Мұны кімнен үйрендің?<br/>
<hr/>
Σταμάτησα να χρησιμοποιώ τα μέσα κοινωνικής δικτύωσης.<br/>
Әлеуметтік желілерді пайдалануды тоқтаттым.<br/>
