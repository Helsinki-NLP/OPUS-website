<p>
ここに置いてもいいですか。<br/>
ನಾನು ಅದನ್ನು ಇಲ್ಲಿ ಇಡಬಹುದೇ?<br/>
<hr/>
今日も雨だ。<br/>
ಇವತ್ತು ಮತ್ತೆ ಮಳೆ ಬಂದಿದೆ.<br/>
<hr/>
花が咲いていた。<br/>
ಹೂಗಳು ಅರಳುತ್ತಿದ್ದವು.<br/>
<hr/>
ヨーグルトはお好きですか？<br/>
ನೀವು ಮೊಸರು ಇಷ್ಟಪಡುತ್ತೀರಾ?<br/>
<hr/>
ヨーグルト好きなの？<br/>
ನೀನು ಮೊಸರು ಇಷ್ಟಪಡ್ತಿಯಾ?<br/>
<hr/>
もう食事はしましたか？<br/>
ನೀವು ಊಟ ಮಾಡಿದ್ದೀರಾ?<br/>
