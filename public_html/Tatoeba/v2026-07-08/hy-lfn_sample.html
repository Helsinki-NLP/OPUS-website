<p>
Ընձուղտը փախավ։<br/>
La jirafa ia fuji.<br/>
<hr/>
Սա ընձուղտ է։<br/>
Esta es un jirafa.<br/>
<hr/>
Ուելսում կա մի ասացվածք։<br/>
En Cimri on ave on proverbo.<br/>
<hr/>
Նա ժամանեց ինձանից հետո։<br/>
El ia ariva pos me.<br/>
<hr/>
Մյուսներն էլ են տեսել դա։<br/>
Ance otras ia vide lo.<br/>
<hr/>
Թոմը ապրում է գրադարանում։<br/>
Tom vive en la biblioteca.<br/>
