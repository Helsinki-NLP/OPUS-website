El falseco konduku min al la vero. El mallumo konduku min al la lumo. El la morto konduku min al senmorteco.<br/>
असतो मा सद्गमय । तमसो मा ज्योतिर्गमय । मृत्योर्माऽमृतं गमय ॥<br/>
