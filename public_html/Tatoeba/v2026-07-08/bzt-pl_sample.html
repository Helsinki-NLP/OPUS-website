<p>
Lla werdad es rhen di eisistent.<br/>
Prawda nie istnieje.<br/>
<hr/>
Nw h-afen dew chath nîr.<br/>
Mamy dwa czarne koty.<br/>
<hr/>
Rhen d'ystydd, rhen di ddyled barlar.<br/>
Bez dochodzenia nie masz prawa się wypowiadać.<br/>
<hr/>
Ys h-es llo ddiffensur di lla giwdad.<br/>
Oni są obrońcami miasta.<br/>
<hr/>
