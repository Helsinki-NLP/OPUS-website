Калі мы вучыліся іграць на фартэпіяна, спачатку куплялі Ганона, ён абавязкова патрэбны.<br/>
我哋學鋼琴，一開始會買一本《哈農》，呢本係一定要㗎。<br/>
<hr/>
Ёй вельмі падабаецца англійская мова.<br/>
佢好鍾意英文。<br/>
