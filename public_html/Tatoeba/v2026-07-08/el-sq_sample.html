<p>
Είσαι γυναικάς;<br/>
A je donzhuan?<br/>
<hr/>
Όλοι οι φίλοι σου ήταν γυναικάδες.<br/>
Të gjithë miqtë e tu ishin donzhuane.<br/>
<hr/>
Μπορούμε να μάθουμε όταν κοιμόμαστε;<br/>
A mund të mësojmë kur flemë?<br/>
