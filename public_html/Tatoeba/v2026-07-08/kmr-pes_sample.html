Erê, ez jî kurd im.<br/>
بله، من هم کرد هستم.<br/>
<hr/>
Rêçik şikestî ye.<br/>
راه خراب است.<br/>
<hr/>

همه راه‌ها به رم ختم می‌شوند.<br/>
