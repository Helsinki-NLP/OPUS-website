<p>
Níl Pápa againn!<br/>
Non habemus papam!<br/>
<hr/>
Tagaigí a thuath dhilís bhuaitheach, tagaigí, tagaigí go Beitheal. saolaíodh mar Rí na nAingil é. Taraigí agus tugaigí adhradh don Tiarna.<br/>
Adeste, fideles, læti triumphantes. Venite, venite in Bethlehem. Natum videte Regem angelorum. Venite, adoremus Dominum.<br/>
