<p>
הרגתי את־תום׃<br/>
mi pu catra la .tam.<br/>
<hr/>
בֵּית חַשְׁמוֹנַאי הָיָה בֵּית מַלְכוּת יְהוּדִי, אֲשֶׁר מָשַׁל בְּאֶרֶץ יִשְׂרָאֵל וְעָמַד בְּרֹאשׁ מֶרֶד הַמַּכַּבִּים׃<br/>
la .xasmoneis. cu xebro je nolraitru lanzu poi turni lo gugde be la .israel. gi'e lidne lo nu la .makabis. cu zunti<br/>
