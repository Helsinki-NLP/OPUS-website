<p>
Թոմը մոռացել է անջատել նկուղի լույսը։<br/>
Tom glömde att släcka i källaren.<br/>
<hr/>
Թոմը նույնպես կարմիր մեքենա ունի։<br/>
Tom har också en röd bil.<br/>
<hr/>
Ես Հելսինկիում չեմ ապրում։<br/>
Jag bor inte i Helsingfors.<br/>
