<p>
Menikö autosi rikki?<br/>
ለ ዐረበትከ ለከፍካሃ፥<br/>
<hr/>
Siihen aikaan olimme rikkaita.<br/>
በዲር ጽጉባም ዐልና።<br/>
<hr/>
Tämä suihku on rikki.<br/>
ኢሊ ሐማም ከርበ።<br/>
<hr/>
Lämmitys on rikki.<br/>
ለ መሕፍኒ ከርባ።<br/>
<hr/>
Kova!<br/>
ጅንግር<br/>
<hr/>
Kova!<br/>
ዐቢ<br/>
<hr/>
Naurettavaa.<br/>
መስሕቃይ<br/>
<hr/>
Hupsista!<br/>
ዬ<br/>
<hr/>
