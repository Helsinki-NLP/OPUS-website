<p>
Δεν τρώω ψάρι.<br/>
No manjo mìa pése.<br/>
<hr/>
Αυτές οι γάτες τρώνε πολύ ψάρι.<br/>
Sti gati i xe drìo manjar tanto pése.<br/>
<hr/>
Θέλεις να πιεις ένα ποτήρι κρασί;<br/>
Vołito bévar un got de vin?<br/>
<hr/>
