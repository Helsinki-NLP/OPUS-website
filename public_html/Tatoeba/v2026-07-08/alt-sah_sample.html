<body>
<p>
Сен кайда јадып јадыҥ?<br/>
Эн ханна олороҕунуй?<br/>
<hr/>
Сахалап куучындап тургаҥ ба?<br/>
Сахалыы саҥараҕын дуо?<br/>
<hr/>
Мен кискелерди јарадам, кискелер мени јарадат.<br/>
Мин куоскалары сөбүлүүбүн, куоскалар даҕаны миигин сөбүлүүллэр.<br/>
<hr/>
Бис айылда јададыс.<br/>
Биһиги дьиэҕэ олоробут.<br/>
<hr/>
Бӱгӱн кӱн ай кандый?<br/>
Бүгүн күн-дьыл хайдаҕый?<br/>
<hr/>
</body></html/>
