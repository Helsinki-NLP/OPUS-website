Huawei Honor või lihtsalt Honor (stiliseeritult ka honor) on Huawei alam-kaubamärk, mis on põhiliselt keskendunud nutitelefonidele ja on eksklusiivne online-turule.<br/>
Huawei Honor یا صرف Honor (بطور اعزاز ) Huawei کا ایک ذیلی برانڈ ہے جو بنیادی طور پر اسمارٹ فونز پر مرکوز ہے اور آن لائن مارکیٹ.<br/>
