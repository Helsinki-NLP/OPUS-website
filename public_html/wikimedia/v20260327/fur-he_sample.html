e.<br/>
בעת שהייתה ילדה המירו הוריה את דתם לקתולית, אולם אף על פי כך מרי ואן גודלו במסגרת הכנסייה האנגליקנית על פי הוראתו המפורשת של המלך צ'ארלס, שהבין שהציבור האנגלי והפרלמנט לא יסתכלו בעין יפה על הפיכת שושלת המלוכה לשושלת קתולית.<br/>
