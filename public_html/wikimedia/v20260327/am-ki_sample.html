<p>
ታሥራለች የኢትዮጵያ ፊልም ነው። ፊልሙ በሀገሪቱ ሲኒማ ቤቶች ረዥም ጊዜ የቆየ ሲሆን በህዝብ ዘንድ ከፍተኛ ተቀባይነትን አግኝቷል።<br/>
Ticirarechi (kana 'nĩ mwohe' na Gĩkũyũ) nĩ thinema kuuma bũrũri wa Ithiobia ĩna ngumo nene bũrũri ũcio na ginya mũrĩmo Athaki anene Ha<br/>
