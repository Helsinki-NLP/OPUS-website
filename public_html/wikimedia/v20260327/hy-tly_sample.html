<p>
Մեծ Ծարասար Ծարասար, Ծարա լեռ, Քեթի Հյուսիսային, Թեփի Փոքր, լեռնագագաթ Հայաստանի Գեղարքունիքի մարզի և Արցախի սահմանագլխին, Արևելյան Սևանի, Վարդենիսի և Զանգեզուրի լեռների հանգուցակետում։ Ունի 3441 մ բարձրություն[1][2] ։<br/>
Dıjdə Çorsər - i bando Qədəli Qafqaz Uçəri 3441m [1][2] ։<br/>
<hr/>
