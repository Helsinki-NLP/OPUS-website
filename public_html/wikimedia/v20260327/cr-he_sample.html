ᐅᓴᑲᐅᓴᑲᐅᐅᓴᑲᐅᓴᑲᓴᑲᐅᓴᑲ<br/>
שבי העמוני הוא דמות מקראית, בנו של נחש העמוני. בתקופת דוד מלך ישראל אחיו חנון בן נחש ירש מאביו נחש העמוני את מלכותו על ממלכת בני עמון שבעבר הירדן המזרחי. בימיו נכבשה ממלכת בני עמון על ידי ממלכת ישראל המאוחדת.[1]<br/>
