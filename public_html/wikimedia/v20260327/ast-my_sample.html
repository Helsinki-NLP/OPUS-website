<p>
Birmanu pue referise a:<br/>
မြန်မာများကိုရည်ညွှန်းနိုင်သည်:<br/>
<hr/>
Habitante de Myanmar (Birmania) o a un miembru de la etnia bamar, mayoritaria nel país. Idioma birmanu. Una raza de gatu<br/>
မြန်မာနိုင်ငံတွင် မှီတင်းနေထိုင်သူ သို့မဟုတ် ဗမာလူမျိုး အများစုပါဝင်သည့် နိုင်ငံဖြစ်သည်။<br/>
