21 مہِ صدی (مسيحی سالک) چُھ 21 مہِ صدٕک دور، یُس 2001 پیٹھہٕ 2100۔<br/>
De 21e eeuw (van de christelijke jaartelling) is de 21e periode van 100 jaar, dus bestaande uit de jaren 2001 tot en met 2100. De 21e eeuw is de eerste eeuw van het 3e millennium.<br/>
