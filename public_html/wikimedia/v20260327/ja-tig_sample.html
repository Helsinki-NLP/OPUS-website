日本国（にほんこく、にっぽんこく）は[1]、東アジアに位置する国家。面積は377,975.64 km2（平方キロメートル） [2]、人口は1億2339万7000人[3]。首都は東京都（事実上）[7]。 通称は日本（にほん、にっぽん）。<br/>
ጃፓን (ጃፓንኛ፥ 日本) እት ምፍጋርጻሓይ ኣስያ ለትትረከብ ዐድ ተ። ዲብ ጃፓን 123,397,000 ነፈር ነብረው[1] ወዓሲመት ቶክዮ ትትበሀል።<br/>
