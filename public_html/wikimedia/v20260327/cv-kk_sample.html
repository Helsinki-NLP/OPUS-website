Астана — Касакстан Республикин тӗп хули.<br/>
Астана — Қазақстан Республикасының астанасы.<br/>
<hr/>
1997 ҫулхи раштав уйӑхен 10-мӗшӗнчен пуҫласа тӗп хула статусне йышӑнӑ.<br/>
1997 жылғы 10 желтоқсаннан бастап астана статусына ие.<br/>
