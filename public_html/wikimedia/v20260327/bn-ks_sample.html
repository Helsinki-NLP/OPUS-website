<p>
অলক্ষ্মী একজন হিন্দু দেবী। তিনি লক্ষ্মীর ছায়া এবং দুর্ভাগ্যের দেবী। অলক্ষ্মী কল্কি পুরাণ ও মহাভারত কথিত দৈত্য কলির দ্বিতীয়া স্ত্রী।[1]<br/>
اَلَکشمی چھےٚ اکھ ہیٚنٛدۍ دیوی۔ سۄ چھےٚ لَکشمی ہنٛز ژھاے تہٕ بد قسمتی ہِنٛز دیوی۔ اَلَکشمی ٲس کلکی پُران تہٕ مَہابارَت مُطٲبِق کالی راکشس سٕنٛز دۆیم زَنان۔[1]<br/>
<hr/>
